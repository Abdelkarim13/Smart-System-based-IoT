<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Dashboard</title>  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto:ital,wdth,wght@1,80.9,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="overlay">
  <div class="login">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="username">
    <input type="password" id="password" placeholder="password"
      onkeydown="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">Owner</button>
  </div>
</div>

<!-- Main Dashboard -->
<div id="main-dashboard" class="container hidden">
  <header>
    <h1>Dashboard</h1>
  </header>

  <div class="grid">

    <!-- Temperature Card -->
    <div class="glass-card">
      <img src="https://img.icons8.com/fluency/96/thermometer.png" alt="temp">
      <h3>Temperature</h3>
      <p class="value"><span id="temp">0</span>°C</p>
    </div>

    <!-- Humidity Card -->
    <div class="glass-card">
      <img src="https://img.icons8.com/fluency/96/hygrometer.png" alt="hum">
      <h3>Humidity</h3>
      <p class="value"><span id="hum">0</span>%</p>
    </div>

    <!-- Light Card -->
    <div class="glass-card">
      <img src="https://img.icons8.com/fluency/96/light-automation.png" alt="light">
      <h3>Light</h3>
      <div class="controls">
        <button class="on-btn" onclick="sendControl('light','on')">Turn On</button>
        <button class="off-btn" onclick="sendControl('light','off')">Turn Off</button>
      </div>
    </div>

    <!-- Fan Card -->
    <div class="glass-card">
      <img id="fan-icon" src="https://img.icons8.com/fluency/96/fan.png" alt="fan">
      <h3>Auto Mode (<span id="auto-state">OFF</span>)</h3>

      <!-- Fan speed and state -->
      <p id="fan-speed-info">Speed: OFF // State: OFF</p>

      <!-- Control Buttons -->
      <div class="controls">
        <button class="on-btn" onclick="startControl()">Start</button>
        <button class="off-btn" onclick="stopControl()">Stop</button>
      </div>
      <!-- Mode Buttons -->
      <button class="manual-btn" onclick="openSettings()">Manual</button>
      <button class="auto-btn" onclick="enableAutoMode()">Auto</button>
    </div>

  </div>
</div>

<!-- Settings Window -->
<div class="SettingWindow hidden" id="SettingWindow">
  <div class="SettingBar">
    <button class="Exit" onclick="closeSettings()"></button>

    <h2>Set Temperature Threshold</h2>
    <input type="range" id="tempthreshold" name="Threshold" min="10" max="50">
    <p id="threshold-display">10°C</p>

    <h2>Set Fan Speed</h2>
    <div class="FanSpeed">
      <div>
        <input type="radio" name="options" id="LowSpeed" value="Low">
        <label for="LowSpeed">Low</label>
      </div>
      <div>
        <input type="radio" name="options" id="MediumSpeed" value="Medium">
        <label for="MediumSpeed">Medium</label>
      </div>
      <div>
        <input type="radio" name="options" id="HighSpeed" value="High">
        <label for="HighSpeed">High</label>
      </div>
    </div>
    <div class="SaveButton">
      <button onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<script src="index.js"></script>
</body>
</html>
